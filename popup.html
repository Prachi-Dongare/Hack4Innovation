<!DOCTYPE html>
<html>
<head>
    <title>Scam Shield</title>
    <style>
        body {
            width: 320px;
            font-family: 'Segoe UI', sans-serif;
            padding: 18px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 70px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            resize: none;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        #analyzeBtn {
            background: #00c6ff;
            color: black;
        }

        #recordBtn {
            background: #00ff9d;
            color: black;
        }

        #uploadBtn {
            background: #ffcc00;
            color: black;
        }

        #result {
            margin-top: 12px;
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            min-height: 40px;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <h2> Scam Shield</h2>

    <textarea id="textInput" placeholder="Paste or type message here..."></textarea>
    <button id="analyzeBtn">Analyze Text</button>

    <button id="recordBtn">Start Voice Recording</button>

    <button id="uploadBtn">Upload Audio File</button>
    <input type="file" id="audioFile" accept="audio/*">

    <div id="result">Result will appear here...</div>

    <script src="popup.js"></script>
</body>
</html>
